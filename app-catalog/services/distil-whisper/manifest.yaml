id: distil-whisper
name: Distil-Whisper
type: service
category: voice
version: 1.0.0
description: "Hugging Face's distilled Whisper — 6× faster than whisper-large-v3 at within 1% WER. Drop-in via transformers."
homepage: https://github.com/huggingface/distil-whisper
license: MIT

requires:
  ram_mb: 3072
  python: ">=3.9"

install:
  method: pip
  package: transformers

hardware_tiers:
  arm-npu-16gb: degraded
  arm-npu-32gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: degraded
  cpu-only: degraded
  apple-silicon: full
