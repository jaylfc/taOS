name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # 06:00 UTC daily run keeps the 3.11 leg honest without making every
    # PR wait 14 extra minutes on it. 3.11 is consistently ~2x slower
    # than 3.12/3.13 due to per-test asyncio overhead — investigated
    # with per-test timing and the gap is distributed (not a single
    # slow test), so a kernel-level interpreter perf issue rather than
    # something we can fix in our suite.
    - cron: "0 6 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        # PR + push runs cover the latest two; the daily cron run
        # below adds 3.11 so the minimum-supported version stays tested.
        python-version: ${{ github.event_name == 'schedule' && fromJSON('["3.11", "3.12", "3.13"]') || fromJSON('["3.12", "3.13"]') }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Build SPA bundle
        # Several backend tests serve from static/desktop/* and 404 if the
        # bundle isn't built (e.g. test_root_redirects_to_desktop). The bundle
        # is gitignored (see #375) — generated, not source — so CI builds it
        # before running pytest.
        run: |
          cd desktop
          npm ci --silent
          npm run build

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/e2e

      - name: Verify app starts
        run: python -c "from tinyagentos.app import create_app; print('OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for syntax errors
        run: python -m compileall tinyagentos/ -q
