name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    # Bumped from 35 to 45: 3.11 was hitting the cap because it has fewer
    # pre-built wheels for our deps + the newly-added SPA build step adds
    # ~30s. Cancellations were showing as CANCELLED instead of TIMED_OUT,
    # which made the cause non-obvious.
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Build SPA bundle
        # Several backend tests serve from static/desktop/* and 404 if the
        # bundle isn't built (e.g. test_root_redirects_to_desktop). The bundle
        # is gitignored (see #375) — generated, not source — so CI builds it
        # before running pytest.
        run: |
          cd desktop
          npm ci --silent
          npm run build

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/e2e

      - name: Verify app starts
        run: python -c "from tinyagentos.app import create_app; print('OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for syntax errors
        run: python -m compileall tinyagentos/ -q
